<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div>
      <div class="admin-title"><i class="fa-solid fa-shield-halved"></i> Admin Paneli</div>
      <div style="font-size:.82rem;color:var(--text-dimmer);margin-top:3px">Mezatları ve kullanıcı başvurularını yönet</div>
    </div>
    <button class="btn btn-outline" onclick="showHome()"><i class="fa-solid fa-arrow-left"></i> Siteye Dön</button>
  </div>
  <div class="admin-grid">
    <div class="panel-box">
      <div class="panel-box-title"><i class="fa-solid fa-plus-circle"></i> Yeni Ürün Ekle</div>
      <div class="form-group"><label>Ürün Adı *</label><input type="text" id="prodName" placeholder="Örn: Vintage Rolex"></div>
      <div class="form-group"><label>Başlangıç Fiyatı (TL) *</label><input type="number" id="prodPrice" placeholder="500" min="1"></div>
      <div class="form-group"><label>Süre (Dakika) *</label><input type="number" id="prodMinutes" placeholder="30" min="1" max="1440"></div>
      <div class="form-group"><label>Görsel URL (Opsiyonel)</label><input type="url" id="prodImg" placeholder="https://..."></div>
      <div class="form-group"><label>Kategori</label>
        <select id="prodCat"><option>Genel</option><option>Elektronik</option><option>Mücevher</option><option>Sanat</option><option>Otomotiv</option><option>Koleksiyon</option></select>
      </div>
      <button class="modal-btn" onclick="addProductAdmin()"><i class="fa-solid fa-gavel"></i> Mezata Aç</button>
      <div class="alert alert-error" id="adminAlert" style="margin-top:.75rem"></div>
      <div class="alert alert-success" id="adminSuccess" style="margin-top:.75rem"></div>
    </div>
    <div class="panel-box">
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('active')" id="atab-active">Aktif Mezatlar</button>
        <button class="admin-tab" onclick="switchAdminTab('pending')" id="atab-pending">Onay Bekleyen <span id="pendingCount"></span></button>
        <button class="admin-tab" onclick="switchAdminTab('users')" id="atab-users">Kayıtlı Kullanıcılar</button>
      </div>
      <div id="adminActiveList"></div>
      <div id="adminPendingList" style="display:none"></div>
      <div id="adminUsersList" style="display:none"></div>
    </div>
  </div>
</div>
